services:
  cockroach:
    image: cockroachdb/cockroach:latest-v24.3
    command: start-single-node --insecure --store=/cockroach/cockroach-data
    ports:
      - "26257:26257"
      - "8081:8080"
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://root@cockroach:26257/defaultdb?sslmode=disable
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET:-docker-compose-dev-session-secret-32!!}
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      cockroach:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  cockroach_data:
